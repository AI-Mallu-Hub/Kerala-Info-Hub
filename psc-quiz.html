<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSC Quiz | Kerala Info Hub</title>

    <link rel="stylesheet" href="quiz.css">
</head>
<body>

<header class="header">

    <a href="index.html" class="logo">
        🌴 Kerala Info Hub
    </a>

</header>

<main class="container">

    <div class="quiz-header">

        <h1>PSC Quiz</h1>

        <p>
            Kerala PSC Staff Nurse Grade ll Previous Questions Practice
        </p>

    </div>

    <div class="mode-buttons">

        <button id="dailyBtn" onclick="startDailyQuiz()">
            📅 Today's Quiz
        </button>

        <button id="practiceBtn" onclick="startPracticeQuiz()">
            🎯 Practice Quiz
        </button>

    </div>

    <div id="quizArea" style="display:none;">

        <div class="progress-box">

            <div id="pageInfo">
                Page 1 / 10
            </div>

            <div id="questionInfo">
                Questions 1 - 5 of 50
            </div>

        </div>

        <div id="quizContainer">

        </div>

        <div class="navigation">

    <button id="prevBtn">
        ⬅ Previous
    </button>

    <button id="checkBtn">
        ✅ Check Answers
    </button>

    <button id="nextBtn" disabled>
        Next ➜
    </button>
      <button id="submitBtn" style="display:none;">
    🏁 Submit Quiz
      </button>      
            <div id="pageScore" class="page-score" style="display:none;"></div>

</div>
    </div>

    <div id="resultBox" style="display:none;">
        <div class="result-actions">

    <button id="retakeBtn">
        🔄 Retake Quiz
    </button>

    <button id="reviewBtn">
        📖 Review All Answers
    </button>

        </div>

        <h2>🎉 Quiz Completed</h2>

        <h3 id="scoreText"></h3>

        <p id="correctText"></p>

        <p id="wrongText"></p>

        <button onclick="location.reload()">
            Start Again
        </button>

    </div>

</main>

<footer>

    © 2026 Kerala Info Hub - AmC

</footer>

<script src="quiz.js"></script>

</body>
</html>
